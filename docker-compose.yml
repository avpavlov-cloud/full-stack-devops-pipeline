version: '3.8'

services:
  # Наше Go-приложение
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: go-app-service
    restart: always
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_NAME=devops_db
    depends_on:
      - db
    networks:
      - backend

  # База данных PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=devops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  # Прокси-сервер Nginx (входная точка)
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
