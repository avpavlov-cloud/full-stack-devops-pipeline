---
- name: Local to Multipass Deploy (Full Offline)
  hosts: all
  become: yes

  vars:
    # Пути для архивов на локальной машине (откуда запускаете Ansible)
    archive_app: "/tmp/my-go-app.tar"
    archive_prom: "/tmp/prometheus.tar"
    archive_grafana: "/tmp/grafana.tar"
    # IP вашего app-server для конфига Prometheus (подставьте свой, если изменился)
    app_server_ip: "10.157.62.200"

  tasks:
    # --- ЭТАП 1: ПОДГОТОВКА ВСЕХ ОБРАЗОВ ЛОКАЛЬНО ---
    - name: Prepare images locally
      delegate_to: localhost
      become: no
      run_once: true
      block:
        - name: Build App Image
          community.docker.docker_image:
            build: { path: "../app" }
            name: "my-go-app"
            tag: "latest"
            source: build

        - name: Pull Monitoring Images
          shell: "docker pull {{ item }}"
          loop: ["prom/prometheus:latest", "grafana/grafana:latest"]

        - name: Save all to tarballs
          shell: "docker save {{ item.name }} > {{ item.path }}"
          loop:
            - { name: "my-go-app:latest", path: "{{ archive_app }}" }
            - { name: "prom/prometheus:latest", path: "{{ archive_prom }}" }
            - { name: "grafana/grafana:latest", path: "{{ archive_grafana }}" }

    # --- ЭТАП 2: ПЕРЕДАЧА И ЗАПУСК ПРИЛОЖЕНИЯ ---
    - name: Deploy App
      when: inventory_hostname in groups['app_servers']
      block:
        - name: Copy App Tarball
          copy: { src: "{{ archive_app }}", dest: "/tmp/app.tar" }
        
        - name: Load App Image
          shell: "docker load < /tmp/app.tar"
        
        - name: Cleanup App Tarball
          file: { path: "/tmp/app.tar", state: absent }

        - name: Start Go App Container
          community.docker.docker_container:
            name: "go-app"
            image: "my-go-app:latest"
            state: started
            restart_policy: always
            published_ports: 
              - "80:8080"

    # --- ЭТАП 3: ПЕРЕДАЧА И ЗАПУСК МОНИТОРИНГА ---
    - name: Deploy Monitoring
      when: inventory_hostname in groups['monitoring_servers']
      block:
        - name: Create Prometheus Config Directory
          file: { path: "/opt/prometheus", state: directory, mode: '0755' }

        - name: Create Prometheus Config File
          copy:
            dest: "/opt/prometheus/prometheus.yml"
            content: |
              global:
                scrape_interval: 10s
              scrape_configs:
                - job_name: 'go-app'
                  static_configs:
                    - targets: ['{{ app_server_ip }}:80']

        - name: Copy Monitoring Tarballs
          copy:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
          loop:
            - { src: "{{ archive_prom }}", dest: "/tmp/prom.tar" }
            - { src: "{{ archive_grafana }}", dest: "/tmp/grafana.tar" }

        - name: Load Monitoring Images
          shell: "docker load < {{ item }}"
          loop: ["/tmp/prom.tar", "/tmp/grafana.tar"]

        - name: Cleanup Monitoring Tarballs
          file: { path: "{{ item }}", state: absent }
          loop: ["/tmp/prom.tar", "/tmp/grafana.tar"]

        - name: Start Prometheus
          community.docker.docker_container:
            name: prometheus
            image: prom/prometheus:latest
            state: started
            restart_policy: always
            published_ports:
              - "9090:9090"
            volumes:
              - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

        - name: Start Grafana
          community.docker.docker_container:
            name: grafana
            image: grafana/grafana:latest
            state: started
            restart_policy: always
            published_ports:
              - "3000:3000"

    # --- ЭТАП 4: НАСТРОЙКА FIREWALL (UFW) ---
    - name: Open Ports in Firewall
      shell: "ufw allow {{ item }}/tcp"
      loop: ["80", "8080", "3000", "9090"]
      ignore_errors: yes # На случай, если ufw не активен

