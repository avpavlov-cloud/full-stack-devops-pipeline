---
- name: Deploy Full-Stack DevOps Pipeline
  hosts: all
  become: yes

  tasks:
    - name: Ensure project directory exists
      file:
        path: /opt/devops-pipeline
        state: directory
        mode: '0755'

    - name: Copy Docker Compose file
      copy:
        src: ../docker-compose.yml
        dest: /opt/devops-pipeline/docker-compose.yml

    - name: Copy Nginx configuration (fixed path)
      copy:
        src: ../default.conf
        dest: /opt/devops-pipeline/default.conf

    - name: Copy App source (if needed for build)
      copy:
        src: ../app/
        dest: /opt/devops-pipeline/app/

    - name: Pull and Start Docker Containers (using shell)
      shell: "docker-compose up -d --build"
      args:
        chdir: /opt/devops-pipeline
