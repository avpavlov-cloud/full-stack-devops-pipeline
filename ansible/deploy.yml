- name: Local to Multipass Deploy (Full Offline)
  hosts: all
  become: yes

  vars:
    # Пути для архивов на локальной машине
    archive_app: "/tmp/my-go-app.tar"
    archive_prom: "/tmp/prometheus.tar"
    archive_grafana: "/tmp/grafana.tar"

  tasks:
    # --- ЭТАП 1: ПОДГОТОВКА ВСЕХ ОБРАЗОВ ЛОКАЛЬНО ---
    - name: Prepare images locally
      delegate_to: localhost
      become: no
      run_once: true
      block:
        - name: Build App Image
          community.docker.docker_image:
            build: { path: "../app" }
            name: "my-go-app"
            source: build

        - name: Pull Monitoring Images
          shell: "docker pull {{ item }}"
          loop: ["prom/prometheus:latest", "grafana/grafana:latest"]

        - name: Save all to tarballs
          shell: "docker save {{ item.name }} > {{ item.path }}"
          loop:
            - { name: "my-go-app:latest", path: "{{ archive_app }}" }
            - { name: "prom/prometheus:latest", path: "{{ archive_prom }}" }
            - { name: "grafana/grafana:latest", path: "{{ archive_grafana }}" }

    # --- ЭТАП 2: ПЕРЕДАЧА И ЗАПУСК ПРИЛОЖЕНИЯ ---
    - name: Deploy App
      when: inventory_hostname in groups['app_servers']
      block:
        - copy: { src: "{{ archive_app }}", dest: "/tmp/app.tar" }
        - shell: "docker load < /tmp/app.tar"
        - file: { path: "/tmp/app.tar", state: absent }
        - community.docker.docker_container:
            name: "go-app"
            image: "my-go-app:latest"
            state: started
            published_ports: ["80:8080"]

    # --- ЭТАП 3: ПЕРЕДАЧА И ЗАПУСК МОНИТОРИНГА ---
    - name: Deploy Monitoring
      when: inventory_hostname in groups['monitoring_servers']
      block:
        - name: Copy Monitoring Tarballs
          copy:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
          loop:
            - { src: "{{ archive_prom }}", dest: "/tmp/prom.tar" }
            - { src: "{{ archive_grafana }}", dest: "/tmp/grafana.tar" }

        - name: Load Monitoring Images
          shell: "docker load < {{ item }}"
          loop: ["/tmp/prom.tar", "/tmp/grafana.tar"]

        - name: Cleanup monitoring tarballs
          file:
            path: "{{ item }}"
            state: absent
          loop: ["/tmp/prom.tar", "/tmp/grafana.tar"]
          
        - name: Start Prometheus (Already using loaded image)
          community.docker.docker_container:
            name: prometheus
            image: prom/prometheus:latest
            state: started
            # ... остальные настройки (volumes, ports) те же
