---
- name: Install Docker via Official Script
  hosts: all
  become: yes
  tasks:
    - name: Install curl
      apt:
        name: curl
        update_cache: yes
        state: present

    - name: Download and run Docker installation script
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker # Скрипт не запустится, если docker уже есть

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
